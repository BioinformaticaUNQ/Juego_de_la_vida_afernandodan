name: Docker Build & Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Obtener versión del release
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: apurada-ribosomica:${{ steps.version.outputs.VERSION }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Crear release asset con imagen Docker
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: /tmp/image.tar
          asset_name: apurada-ribosomica-${{ steps.version.outputs.VERSION }}-docker.tar
          asset_content_type: application/x-tar
